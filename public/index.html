<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Super Mario Bros. TCG</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
	
	<text id="thingy"></text>

	<div id="signedOut">
		<button onclick="logIn()">log in/sign up</button><br>
		<img id="demoCard" src="/cardimg?name=card_back.png"><br>
		<button onclick="newCard()">New card</button><br>
		<img src="/cardimg?name=card_back.png" onclick="this.classList.add('selected')">
	</div>
	<div id="signedIn" hidden>
		<h1>Let's-a-go, <span id="signedInUsernameLabel"></span>!</h1>
		<button onclick="createGame('RPS')">New Boulder-Angle-Flat game</button>
		<button onclick="createGame('COW')">New Sheriff game</button>
		<button onclick="createGame('MARIO')">New Mario game</button>
		<button onclick="joinGame()">Join game</button>
		<button disabled>Edit deck</button>
		<button disabled>Shop</button>
		<button onclick="signOut()">Sign out</button><br>
		<text>session: <span id="sessionLabel"></span></text>
	</div>
	<div id="gameDiv" hidden>
		<h1><span id="P1Label"></span> vs. <span id="P2Label"></span></h1>
		
		
		<div id="RPS" hidden>
			<button id="rps0" onclick="rpsChoice(0)">boulder</button>
			<button id="rps1" onclick="rpsChoice(1)">flat</button>
			<button id="rps2" onclick="rpsChoice(2)">angle</button><br>
			<text>Current choice: <span id="rpsCurrentChoice">rock</span></text><br>
			<button id="rpsSubmitButton" onclick="rpsSubmit()">Submit</button>
		</div>
		<div id="COW" hidden>
			<text>You have <span id="cowBullets">0</span> bullets.</text><br>
			<button id="cow0" onclick="cowChoice(0)">reload</button>
			<button id="cow1" onclick="cowChoice(1)" disabled>shoot</button>
			<button id="cow2" onclick="cowChoice(2)">shield</button><br>
			<text>Current choice: <span id="cowCurrentChoice"></span></text><br>
			<text>Opponent's last choice: <span id="cowOppChoice"></span></text><br>
			<button id="cowSubmitButton" onclick="cowSubmit()" disabled>Submit</button>
		</div>
		<div id="MARIO" hidden>
			<div id="marioOppItems" class="cardContainer opp">
				
			</div>
			<div id="marioOppHand" class="cardContainer opp">
				
			</div>
			<div id="marioOppQueue" class="cardContainer opp">
				
			</div>
			<div id="marioQueue" class="cardContainer">
				
			</div>
			<div id="marioHand" class="cardContainer">
				
			</div>
			<span id="marioItems" class="cardContainer">
				
			</span>
			<button id="marioSelfPlay" onclick="marioPlay(0)" disabled>Play on self</button>
			<button id="marioOppPlay" onclick="marioPlay(1)" disabled>Play on opponent</button>
			<button id="marioResolveQueue" onclick="resolveQueue()" disabled>Resolve queue</button>
			<button id="marioEndTurn" onclick="endTurn()" disabled>End turn</button><br>
			<text id="marioStateDisplay"></text><br>
			<text>Deck: <span id="marioDeckSize"></span></text><br>
			<text>Discard: <span id="marioDiscardSize"></span></text>
		</div>
		<br>
		<h1 id="gameWinner"></h1>
		
		<img id="reaction" hidden>
	</div>
	


	<script src="main.js"></script>
</body>

</html>
